<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="36" height="36">
  <defs>
    <filter id="grunge" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="4" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feTurbulence type="turbulence" baseFrequency="0.9" numOctaves="1" seed="3" result="rough"/>
      <feComposite in="displaced" in2="rough" operator="in" result="grungy"/>
      <feComposite in="grungy" in2="displaced" operator="over"/>
    </filter>
  </defs>
  <polygon
    points="50,4 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35"
    fill="#ffffff"
    filter="url(#grunge)"
  />
</svg>

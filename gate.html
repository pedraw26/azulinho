<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Azulinho</title>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800&display=swap" rel="stylesheet"/>
<meta name="robots" content="noindex"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 48px;
  font-family: -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  position: relative;
}

.bg {
  position: fixed;
  inset: 0;
  background: url('assets/hero-img-site.webp') center center / cover no-repeat;
  filter: brightness(0.35);
  z-index: 0;
}

.sig {
  position: relative;
  z-index: 1;
  width: clamp(260px, 40vw, 560px);
  height: auto;
  opacity: 0.9;
  filter: invert(1);
  user-select: none;
}

.gate {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

input[type="password"] {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  font-size: 14px;
  letter-spacing: 0.2em;
  text-align: center;
  width: 160px;
  padding: 8px 0;
  outline: none;
  caret-color: rgba(255,255,255,0.5);
  transition: border-color 0.2s;
}

input[type="password"]::placeholder {
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.15em;
}

input[type="password"]:focus {
  border-bottom-color: rgba(255,255,255,0.6);
}

button {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.45);
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0;
  cursor: pointer;
  transition: color 0.2s;
}
button:hover { color: #fff; }

.msg {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0);
  transition: color 0.3s;
  height: 14px;
}

.msg.error  { color: rgba(255,80,80,0.7); }
.msg.ok     { color: rgba(255,255,255,0.5); }

.company-info {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
  text-align: center;
  line-height: 1.8;
  margin-top: 4px;
}

.noise-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.noise-overlay .noise-default {
  position: absolute;
  inset: -10%;
  width: 120%;
  height: 120%;
  opacity: 0.35;
  mix-blend-mode: screen;
  animation: grain-shift 0.8s steps(2) infinite;
  will-change: transform;
}
.noise-overlay .noise-flipped {
  position: absolute;
  inset: -10%;
  width: 120%;
  height: 120%;
  opacity: 0.06;
  mix-blend-mode: screen;
  animation: grain-flash 1.2s steps(2) infinite;
  will-change: opacity, transform;
}
@keyframes grain-shift {
  0%   { transform: translate3d(0,0,0) scale(1.08); }
  20%  { transform: translate3d(-0.4%,0.3%,0) scale(1.08); }
  40%  { transform: translate3d(0.3%,-0.4%,0) scale(1.08); }
  60%  { transform: translate3d(-0.3%,-0.2%,0) scale(1.08); }
  80%  { transform: translate3d(0.4%,0.3%,0) scale(1.08); }
  100% { transform: translate3d(0,0,0) scale(1.08); }
}
@keyframes grain-flash {
  0%,100% { opacity:0.02; transform: rotateY(-180deg) translate3d(0,0,0) scale(1.08); }
  25%     { opacity:0.06; transform: rotateY(-180deg) translate3d(0.3%,-0.3%,0) scale(1.08); }
  50%     { opacity:0.03; transform: rotateY(-180deg) translate3d(-0.4%,0.4%,0) scale(1.08); }
  75%     { opacity:0.07; transform: rotateY(-180deg) translate3d(0.2%,0.3%,0) scale(1.08); }
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="noise-overlay">
  <img src="assets/cdn.prod.website-files.com/67ee44f1ff9354a5d5c4df6c/67ee85fb0f074b505aea71fe_Noise.avif" alt="" class="noise-default"/>
  <img src="assets/cdn.prod.website-files.com/67ee44f1ff9354a5d5c4df6c/67ee85fb0f074b505aea71fe_Noise.avif" alt="" class="noise-flipped"/>
</div>
<img src="assets/signuture.svg" class="sig" alt="A storm is coming"/>

<form class="gate" id="gate" onsubmit="return false;">
  <input id="pw" type="password" placeholder="password" autocomplete="off" autofocus/>
  <button type="submit">enter</button>
  <div class="msg" id="msg"></div>
  <p class="company-info">Fortuna Records · Registered in England &amp; Wales<br/>Company No. 15473829 · All rights reserved</p>
</form>

<script>
document.getElementById('gate').addEventListener('submit', function() {
  var val = document.getElementById('pw').value.trim();
  var msg = document.getElementById('msg');
  if (val === 'waves97') {
    msg.textContent = 'entering...';
    msg.className = 'msg ok';
    sessionStorage.setItem('az_auth', '1');
    window.location.replace('/waves.html');
  } else {
    msg.textContent = 'incorrect';
    msg.className = 'msg error';
    document.getElementById('pw').value = '';
    setTimeout(function() { msg.className = 'msg'; }, 1800);
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Azulinho</title>
<link href="assets/favicon-star.svg" rel="icon" type="image/svg+xml"/>
<link href="assets/favicon-star.svg" rel="apple-touch-icon"/>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800&display=swap" rel="stylesheet"/>
<meta name="robots" content="noindex"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 48px;
  font-family: -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  position: relative;
}

.bg {
  position: fixed;
  inset: 0;
  background: url('assets/hero-img-site.webp') center center / cover no-repeat;
  filter: brightness(0.35);
  z-index: 0;
}

.sig {
  position: relative;
  z-index: 1;
  width: clamp(260px, 40vw, 560px);
  height: auto;
  opacity: 0.9;
  filter: invert(1);
  user-select: none;
}

.gate {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

input[type="password"] {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  font-size: 14px;
  letter-spacing: 0.2em;
  text-align: center;
  width: 160px;
  padding: 8px 0;
  outline: none;
  caret-color: rgba(255,255,255,0.5);
  transition: border-color 0.2s;
}

input[type="password"]::placeholder {
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.15em;
}

input[type="password"]:focus {
  border-bottom-color: rgba(255,255,255,0.6);
}

button {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.45);
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0;
  cursor: pointer;
  transition: color 0.2s;
}
button:hover { color: #fff; }

.msg {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0);
  transition: color 0.3s;
  height: 14px;
}

.msg.error  { color: rgba(255,80,80,0.7); }
.msg.ok     { color: rgba(255,255,255,0.5); }

.company-info {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
  text-align: center;
  line-height: 1.8;
  margin-top: 4px;
}

.noise-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.noise-overlay::before,
.noise-overlay::after {
  content: '';
  position: absolute;
  inset: -50%;
  width: 200%;
  height: 200%;
  background-image: url('assets/cdn.prod.website-files.com/67ee44f1ff9354a5d5c4df6c/67ee85fb0f074b505aea71fe_Noise.avif');
  background-size: 512px 512px;
  mix-blend-mode: screen;
  will-change: background-position;
}
.noise-overlay::before {
  opacity: 0.38;
  animation: film35-a 1.04s steps(1) infinite;
}
.noise-overlay::after {
  opacity: 0.13;
  animation: film35-b 1.04s steps(1) infinite 0.52s;
}
@keyframes film35-a {
  0%   { background-position:   0px   0px; }
  8%   { background-position: -83px  47px; }
  16%  { background-position:  51px -71px; }
  24%  { background-position: -37px  93px; }
  32%  { background-position:  76px  28px; }
  40%  { background-position: -61px -55px; }
  48%  { background-position:  29px  81px; }
  56%  { background-position: -94px  13px; }
  64%  { background-position:  44px -88px; }
  72%  { background-position: -19px  62px; }
  80%  { background-position:  88px -34px; }
  88%  { background-position: -52px  79px; }
  100% { background-position:   0px   0px; }
}
@keyframes film35-b {
  0%   { background-position:  33px  67px; }
  8%   { background-position: -71px -22px; }
  16%  { background-position:  58px  84px; }
  24%  { background-position: -44px  11px; }
  32%  { background-position:  91px -63px; }
  40%  { background-position: -27px  55px; }
  48%  { background-position:  69px -41px; }
  56%  { background-position: -86px  78px; }
  64%  { background-position:  14px -59px; }
  72%  { background-position: -53px  36px; }
  80%  { background-position:  77px  22px; }
  88%  { background-position: -38px -74px; }
  100% { background-position:  33px  67px; }
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="noise-overlay"></div>
<img src="assets/signuture.svg" class="sig" alt="A storm is coming"/>

<form class="gate" id="gate" onsubmit="return false;">
  <input id="pw" type="password" placeholder="password" autocomplete="off" autofocus/>
  <button type="submit">enter</button>
  <div class="msg" id="msg"></div>
  <p class="company-info">Fortuna Records · Registered in England &amp; Wales<br/>Company No. 15473829 · All rights reserved</p>
</form>

<script>
document.getElementById('gate').addEventListener('submit', function() {
  var val = document.getElementById('pw').value.trim();
  var msg = document.getElementById('msg');
  if (val === 'waves87') {
    msg.textContent = 'entering...';
    msg.className = 'msg ok';
    sessionStorage.setItem('az_auth', '1');
    window.location.replace('/waves.html');
  } else {
    msg.textContent = 'incorrect';
    msg.className = 'msg error';
    document.getElementById('pw').value = '';
    setTimeout(function() { msg.className = 'msg'; }, 1800);
  }
});
</script>
</body>
</html>

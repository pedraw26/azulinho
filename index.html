<div class="gate">
  <input id="pw" type="text" placeholder="password" autocomplete="off" autofocus spellcheck="false"/>
  <button id="btn">enter</button>
  <div id="msg"></div>
</div>

<script>
var PASS = 'waves99';
var dest = 'waves.html';

function attempt() {
  var val = document.getElementById('pw').value.trim().toLowerCase();
  var msg = document.getElementById('msg');
  if (val === PASS) {
    msg.style.color = 'rgba(255,255,255,0.5)';
    msg.textContent = 'entering...';
    setTimeout(function(){ window.location.href = dest; }, 500);
  } else {
    msg.style.color = 'rgba(255,80,80,0.8)';
    msg.textContent = 'incorrect';
    document.getElementById('pw').value = '';
    setTimeout(function(){ msg.style.color = 'transparent'; msg.textContent = ''; }, 1800);
  }
}

document.getElementById('btn').addEventListener('click', attempt);
document.getElementById('pw').addEventListener('keydown', function(e){
  if (e.key === 'Enter') attempt();
});
</script>
